services:
  gpt-sovits-api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        CUDA_VERSION: "${CUDA_VERSION:-}"
    image: gpt-sovits-official:${GPT_SOVITS_TAG:-latest-cpu}
    container_name: gpt-sovits-api
    ports:
      - "${API_PORT:-9880}:9880"
    environment:
      - GPT_SOVITS_DEVICE=${GPT_SOVITS_DEVICE:-cpu}
      - GPT_SOVITS_IS_HALF=${GPT_SOVITS_IS_HALF:-false}
      - GPT_SOVITS_VERSION=${GPT_SOVITS_VERSION:-v2}
      - GPT_SOVITS_DATA_ROOT=/data
      - GPT_SOVITS_CONFIG_OUTPUT=GPT_SoVITS/configs/tts_infer.yaml
      - GPT_SOVITS_CUSTOM_T2S_PATH=${GPT_SOVITS_CUSTOM_T2S_PATH:-}
      - GPT_SOVITS_CUSTOM_VITS_PATH=${GPT_SOVITS_CUSTOM_VITS_PATH:-}
    volumes:
      - ${DATA_ROOT:-./data}/pretrained_models:/data/pretrained_models:ro
      - ${DATA_ROOT:-./data}/G2PWModel:/data/G2PWModel:ro
      - ${DATA_ROOT:-./data}/asr_models:/data/asr_models:ro
      - ${DATA_ROOT:-./data}/uvr5_weights:/data/uvr5_weights:ro
      - ${DATA_ROOT:-./data}/custom_weights:/data/custom_weights:ro
      - ${DATA_ROOT:-./data}/reference_audio:/data/reference_audio:ro
      - ${DATA_ROOT:-./data}/cache:/data/cache
      - ${DATA_ROOT:-./data}/output:/data/output
      - ${DATA_ROOT:-./data}/temp:/data/temp
    healthcheck:
      test: ["CMD", "curl", "--max-time", "5", "--fail", "--silent", "--output", "/dev/null", "http://localhost:9880/openapi.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    shm_size: "4gb"
    networks:
      - gpt-sovits

  gpt-sovits-api-gpu:
    profiles:
      - gpu
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        CUDA_VERSION: "${CUDA_VERSION:-12.6}"
    image: gpt-sovits-official:${GPT_SOVITS_TAG:-latest-cu126}
    container_name: gpt-sovits-api-gpu
    ports:
      - "${GPU_API_PORT:-9882}:9880"
    environment:
      - GPT_SOVITS_DEVICE=cuda
      - GPT_SOVITS_IS_HALF=${GPT_SOVITS_IS_HALF:-true}
      - GPT_SOVITS_VERSION=${GPT_SOVITS_VERSION:-v2}
      - GPT_SOVITS_DATA_ROOT=/data
      - GPT_SOVITS_CONFIG_OUTPUT=GPT_SoVITS/configs/tts_infer.yaml
      - GPT_SOVITS_CUSTOM_T2S_PATH=${GPT_SOVITS_CUSTOM_T2S_PATH:-}
      - GPT_SOVITS_CUSTOM_VITS_PATH=${GPT_SOVITS_CUSTOM_VITS_PATH:-}
    volumes:
      - ${DATA_ROOT:-./data}/pretrained_models:/data/pretrained_models:ro
      - ${DATA_ROOT:-./data}/G2PWModel:/data/G2PWModel:ro
      - ${DATA_ROOT:-./data}/asr_models:/data/asr_models:ro
      - ${DATA_ROOT:-./data}/uvr5_weights:/data/uvr5_weights:ro
      - ${DATA_ROOT:-./data}/custom_weights:/data/custom_weights:ro
      - ${DATA_ROOT:-./data}/reference_audio:/data/reference_audio:ro
      - ${DATA_ROOT:-./data}/cache:/data/cache
      - ${DATA_ROOT:-./data}/output:/data/output
      - ${DATA_ROOT:-./data}/temp:/data/temp
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    shm_size: "4gb"
    networks:
      - gpt-sovits

  openai-tts-proxy:
    build:
      context: ../..
      dockerfile: openai_tts_proxy/Dockerfile
    image: gpt-sovits-proxy:${PROXY_TAG:-latest}
    container_name: openai-tts-proxy
    ports:
      - "${PROXY_PORT:-8000}:8000"
    environment:
      - GPT_SOVITS_API_URL=http://gpt-sovits-api:9880
      - VOICES_CONFIG=/app/voices.yaml
    volumes:
      - ${DATA_ROOT:-./data}/reference_audio:/data/reference_audio:ro
      - ${VOICES_YAML:-./openai_tts_proxy/voices.yaml}:/app/voices.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "--max-time", "5", "--fail", "--silent", "--output", "/dev/null", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - gpt-sovits
    depends_on:
      gpt-sovits-api:
        condition: service_healthy
        required: false

  gpt-sovits-webui:
    profiles:
      - webui
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.webui
      args:
        BASE_IMAGE: gpt-sovits-official:${GPT_SOVITS_TAG:-latest-cpu}
    image: gpt-sovits-official-webui:${GPT_SOVITS_TAG:-latest-cpu}
    container_name: gpt-sovits-webui
    ports:
      - "${WEBUI_PORT:-9872}:${WEBUI_PORT:-9872}"
    environment:
      - GPT_SOVITS_DEVICE=${GPT_SOVITS_DEVICE:-cpu}
      - GPT_SOVITS_IS_HALF=${GPT_SOVITS_IS_HALF:-false}
      - GPT_SOVITS_VERSION=${GPT_SOVITS_VERSION:-v2}
      - GPT_SOVITS_DATA_ROOT=/data
      - GPT_SOVITS_CONFIG_OUTPUT=GPT_SoVITS/configs/tts_infer.yaml
      - GPT_SOVITS_CUSTOM_T2S_PATH=${GPT_SOVITS_CUSTOM_T2S_PATH:-}
      - GPT_SOVITS_CUSTOM_VITS_PATH=${GPT_SOVITS_CUSTOM_VITS_PATH:-}
      - infer_ttswebui=${WEBUI_PORT:-9872}
      - is_half=${WEBUI_IS_HALF:-False}
      - is_share=${WEBUI_IS_SHARE:-False}
      - language=${WEBUI_LANGUAGE:-zh_CN}
    volumes:
      - ${DATA_ROOT:-./data}/pretrained_models:/data/pretrained_models:ro
      - ${DATA_ROOT:-./data}/G2PWModel:/data/G2PWModel:ro
      - ${DATA_ROOT:-./data}/asr_models:/data/asr_models:ro
      - ${DATA_ROOT:-./data}/uvr5_weights:/data/uvr5_weights:ro
      - ${DATA_ROOT:-./data}/custom_weights:/data/custom_weights:ro
      - ${DATA_ROOT:-./data}/reference_audio:/data/reference_audio:ro
      - ${DATA_ROOT:-./data}/cache:/data/cache
      - ${DATA_ROOT:-./data}/output:/data/output
      - ${DATA_ROOT:-./data}/temp:/data/temp
    command:
      - bash
      - -lc
      - |
        link_dir() {
          src="$$1"
          dst="$$2"
          if [ -d "$$src" ]; then
            rm -rf "$$dst"
            ln -sfn "$$src" "$$dst"
          fi
        }
        link_dir /data/pretrained_models GPT_SoVITS/pretrained_models
        link_dir /data/G2PWModel GPT_SoVITS/text/G2PWModel
        link_dir /data/asr_models tools/asr/models
        link_dir /data/uvr5_weights tools/uvr5/uvr5_weights
        python deploy/docker/render_tts_config.py
        python GPT_SoVITS/inference_webui_fast.py "$${language:-zh_CN}"
    healthcheck:
      test: ["CMD-SHELL", "curl --max-time 5 --fail --silent --output /dev/null http://localhost:$${infer_ttswebui:-9872}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    shm_size: "4gb"
    networks:
      - gpt-sovits

networks:
  gpt-sovits:
    driver: bridge
